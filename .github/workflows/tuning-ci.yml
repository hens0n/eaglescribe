# Required, platform-independent pull-request gate for deterministic Tuning behavior.
name: Tuning CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: tuning-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deterministic-tuning:
    name: Tuning semantics (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            runner: macos-14
          - platform: Linux
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libxdo-dev \
            libx11-dev

      - name: Install macOS build tools
        if: matrix.platform == 'macOS'
        run: brew install cmake || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run build

      - name: Typecheck Rust targets
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets --locked

      - name: Run deterministic Tuning and full Rust fixture suites
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets --locked
